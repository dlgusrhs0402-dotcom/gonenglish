<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Lines · 영화로 배우는 영어</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f0;
  --bg-warm: #ffffff;
  --ink: #1a1614;
  --gold: #b8893d;
  --gold-dim: #8b6f47;
  --red: #a01e23;
  --green: #5a7a4a;
  --text-dim: #6b6358;
  --line: rgba(139, 111, 71, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image: 
    radial-gradient(ellipse at top, rgba(184, 137, 61, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at bottom, rgba(160, 30, 35, 0.06) 0%, transparent 50%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  opacity: 0.08;
  pointer-events: none;
  z-index: 100;
  mix-blend-mode: multiply;
}

.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  position: relative;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 24px;
  margin-bottom: 40px;
}

.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.03em;
  color: var(--ink);
}

.logo span {
  color: var(--gold);
  font-style: italic;
  font-weight: 300;
}

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Scene Card */
.scene {
  background: var(--bg-warm);
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease;
  box-shadow: 0 24px 48px -16px rgba(26, 22, 20, 0.08), 0 8px 16px -8px rgba(26, 22, 20, 0.04);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.scene-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 32px;
  border-bottom: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.scene-meta .left {
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
}

.dot {
  width: 6px;
  height: 6px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.movie-title { color: var(--gold); }

.counter .current {
  color: var(--gold);
  font-size: 14px;
}

.scene-inner {
  display: flex;
  min-height: 340px;
}

.scene-content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Quote display */
.scene-body {
  padding: 40px 48px 32px;
  text-align: center;
  position: relative;
}

.quote {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(20px, 3vw, 32px);
  font-style: italic;
  font-weight: 300;
  line-height: 1.65;
  color: var(--ink);
  max-width: 720px;
  margin: 0 auto 20px;
  position: relative;
  z-index: 1;
  letter-spacing: -0.01em;
}

/* Clickable word */
.word {
  cursor: pointer;
  display: inline;
  border-radius: 2px;
  transition: background 0.15s, color 0.15s;
  padding: 1px 2px;
  position: relative;
}

.word:hover {
  background: rgba(184, 137, 61, 0.15);
  color: var(--gold);
}

.word.active {
  background: rgba(184, 137, 61, 0.2);
  color: var(--gold);
}

/* Word popup */
.word-popup {
  position: fixed;
  z-index: 9999;
  background: var(--ink);
  color: var(--bg);
  border: 1px solid var(--gold-dim);
  padding: 16px 20px;
  min-width: 220px;
  max-width: 300px;
  box-shadow: 0 16px 40px -8px rgba(26, 22, 20, 0.4);
  display: none;
  animation: popIn 0.18s ease;
  pointer-events: auto;
}

.word-popup.show { display: block; }

@keyframes popIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.popup-word {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 600;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.popup-pos {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 10px;
}

.popup-meaning {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--bg);
  line-height: 1.5;
  margin-bottom: 8px;
}

.popup-example {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  color: rgba(250, 247, 240, 0.55);
  line-height: 1.5;
  border-top: 1px solid rgba(139, 111, 71, 0.3);
  padding-top: 8px;
}

.popup-loading {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--gold-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}

.popup-loading::before {
  content: '';
  width: 8px;
  height: 8px;
  border: 1px solid var(--gold-dim);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
  flex-shrink: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.popup-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: var(--gold-dim);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px;
  transition: color 0.15s;
}
.popup-close:hover { color: var(--gold); }

.popup-hint {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(250,247,240,0.3);
  margin-top: 8px;
  text-align: right;
}

.movie-label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

.character {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
}

.character::before { content: '— '; }

/* Hint tip */
.click-tip {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  opacity: 0.6;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.click-tip svg {
  width: 12px; height: 12px;
  fill: none; stroke: currentColor; stroke-width: 1.5;
}

/* Actions */
.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0 32px 24px;
  flex-wrap: wrap;
}

/* Pronunciation */
.pronunciation {
  margin-top: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  display: none;
}

.pronunciation.show {
  display: block;
  animation: fadeIn 0.3s;
}

.pronunciation::before {
  content: '발음 · ';
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-right: 4px;
}

/* Translation */
.translation {
  margin: 0 48px;
  padding: 20px 0;
  border-top: 1px dashed var(--line);
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.6;
  text-align: center;
  display: none;
}

.translation.show {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.translation strong {
  color: var(--gold);
  font-weight: 500;
  margin-right: 6px;
}

/* Footer / Nav */
.nav {
  padding: 20px 32px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg-warm);
}

/* Buttons */
.btn {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--ink);
  padding: 11px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn:hover {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.btn.primary:hover {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
}

.btn.ghost {
  border-color: var(--line);
  color: var(--text-dim);
}

.btn.ghost:hover {
  color: var(--gold);
  background: transparent;
  border-color: var(--gold-dim);
}

.icon {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.hint {
  text-align: center;
  margin-top: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  line-height: 1.8;
}

@media (max-width: 640px) {
  .header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .scene-body { padding: 40px 24px 24px; }
  .scene-meta { padding: 14px 20px; }
  .scene-meta .left { gap: 12px; font-size: 10px; }
  .translation { margin: 0 20px; }
  .nav { padding: 16px 20px; }
  .actions { padding: 0 20px 20px; }
  .word-popup { max-width: 260px; }
}
</style>
</head>
<body>

<!-- Word Definition Popup -->
<div class="word-popup" id="wordPopup">
  <button class="popup-close" id="popupClose">✕</button>
  <div id="popupContent"></div>
</div>

<div class="container">
  <header class="header">
    <div class="logo">GON<span>english</span></div>
  </header>

  <div class="scene">
    <div class="scene-meta">
      <div class="left">
        <span class="dot"></span>
        <span>Scene <span id="sceneNum">01</span></span>
        <span class="movie-title" id="movieTitle">—</span>
      </div>
      <div class="counter">
        <span class="current" id="currentNum">1</span> / <span id="totalNum">25</span>
      </div>
    </div>

    <div class="scene-inner">

        <div class="scene-body">
          <div class="quote" id="quote">Loading...</div>

            단어를 클릭하면 뜻이 나와요
          </div>
          <div class="movie-label" id="movieLabel"></div>
          <div class="character" id="character"></div>
          <div class="pronunciation" id="pronunciation"></div>
        </div>

        <div class="actions">
          <button class="btn" id="replayBtn">

          </button>

            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            천천히
          </button>
        </div>

        <div class="translation" id="translation"></div>
      </div>
    </div>

    <div class="nav">
      <button class="btn ghost" id="prevBtn">
        <svg class="icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>

      </button>
      <button class="btn ghost" id="pronounceBtn">한국어 발음</button>

      <button class="btn primary" id="nextBtn">
        다음
        <svg class="icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div class="hint">
    🎬 대사를 듣고 따라 말해보세요 · 단어를 클릭하면 뜻 확인
  </div>
</div>

<script>

  { text: "Frankly, my dear, I don't give a damn.", character: "Rhett Butler", movie: "Gone with the Wind (1939)", translation: "솔직히 말해서, 자기야, 난 조금도 신경 안 써.", pronunciation: "프랭클리, 마이 디어, 아이 돈트 기브 어 댐." },

  { text: "Life is like a box of chocolates. You never know what you're gonna get.", character: "Forrest Gump", movie: "Forrest Gump (1994)", translation: "인생은 초콜릿 상자와 같아. 무엇을 집을지 절대 알 수 없거든.", pronunciation: "라이프 이즈 라이크 어 박스 오브 초컬리츠." },

function fetchDefinition(word) {
  const clean = word.replace(/[^a-zA-Z']/g, '').toLowerCase();
  if (!clean) return Promise.resolve(null);
  const entry = WORD_DICT[clean];
  if (entry) {
    return Promise.resolve({ word: clean, pos: entry.pos, meaning: entry.meaning });
  }
  return Promise.resolve({ word: clean, pos: "—", meaning: "사전에 없는 단어예요" });
}

// ============ STATE ============
let shuffled = [...quotes].sort(() => Math.random() - 0.5);
let currentIdx = 0;
let activeWord = null;

document.addEventListener('DOMContentLoaded', () => {
  const $ = (id) => document.getElementById(id);
  const pad = (n) => String(n).padStart(2, '0');
  const getCurrent = () => shuffled[currentIdx];

  // ============ SPEECH ============
  function speak(text, rate = 0.9) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = rate;
    utt.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
           || voices.find(v => v.lang.startsWith('en-US'))
           || voices.find(v => v.lang.startsWith('en'));
    if (v) utt.voice = v;
    window.speechSynthesis.speak(utt);
  }

  if (typeof speechSynthesis !== 'undefined') {
    speechSynthesis.onvoiceschanged = () => {};
  }

  // ============ POPUP ============
  const popup = $('wordPopup');

  function showPopup(wordEl, word) {
    // Deactivate previous
    if (activeWord && activeWord !== wordEl) activeWord.classList.remove('active');
    activeWord = wordEl;
    wordEl.classList.add('active');

    // Position popup near word
    const rect = wordEl.getBoundingClientRect();
    const popupW = 260;
    let left = rect.left + rect.width / 2 - popupW / 2;
    let top = rect.bottom + window.scrollY + 10;

    // Keep in viewport
    if (left < 8) left = 8;
    if (left + popupW > window.innerWidth - 8) left = window.innerWidth - popupW - 8;

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.minWidth = popupW + 'px';

    // Instant lookup from built-in dictionary
    fetchDefinition(word).then(def => {
      if (!def) {
        $('popupContent').innerHTML = `
          <div class="popup-word">${word}</div>
          <div class="popup-meaning">사전에 없는 단어예요.</div>`;
      } else {
        $('popupContent').innerHTML = `
          <div class="popup-word" style="cursor:pointer" title="클릭해서 발음 듣기">${def.word || word}</div>
          <div class="popup-pos">${def.pos || ''}</div>
          <div class="popup-meaning">${def.meaning || ''}</div>
          <div class="popup-hint">단어 클릭 → 발음 듣기</div>
        `;
        $('popupContent').querySelector('.popup-word').onclick = () => speak(def.word || word, 0.8);
      }
      popup.classList.add('show');
    });
  }

  function hidePopup() {
    popup.classList.remove('show');
    if (activeWord) { activeWord.classList.remove('active'); activeWord = null; }
  }

  $('popupClose').onclick = (e) => { e.stopPropagation(); hidePopup(); };

  document.addEventListener('click', (e) => {
    if (!popup.contains(e.target) && !e.target.classList.contains('word')) {
      hidePopup();
    }
  });

  // ============ RENDER QUOTE WITH CLICKABLE WORDS ============
  function renderQuote(text) {
    const quoteEl = $('quote');
    // Split preserving punctuation as separate tokens around words
    const tokens = text.split(/(\s+)/);
    let html = '"';
    tokens.forEach(token => {
      if (/^\s+$/.test(token)) {
        html += token;
      } else {
        // Split off leading/trailing punctuation
        const match = token.match(/^([^a-zA-Z']*)([a-zA-Z']+)([^a-zA-Z']*)$/);
        if (match) {
          const [, pre, word, post] = match;
          html += `${pre}<span class="word" data-word="${word}">${word}</span>${post}`;
        } else {
          html += token;
        }
      }
    });
    html += '"';
    quoteEl.innerHTML = html;

    // Attach click events
    quoteEl.querySelectorAll('.word').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const word = el.dataset.word;
        if (activeWord === el && popup.classList.contains('show')) {
          hidePopup();
        } else {
          showPopup(el, word);
        }
      });
    });
  }

  // ============ RENDER ============
  function render() {
    const q = getCurrent();
    hidePopup();

    $('sceneNum').textContent = pad(currentIdx + 1);
    $('currentNum').textContent = currentIdx + 1;
    $('totalNum').textContent = shuffled.length;
    $('movieTitle').textContent = q.movie;
    $('movieLabel').textContent = q.movie;
    $('character').textContent = q.character;

    renderQuote(q.text);

    $('pronunciation').classList.remove('show');
    $('pronunciation').textContent = q.pronunciation;
    $('translation').classList.remove('show');
    $('translation').innerHTML = `<strong>해석</strong> ${q.translation}`;

    setTimeout(() => speak(q.text, 0.9), 200);
  }

  // ============ EVENTS ============
  $('replayBtn').onclick = () => speak(getCurrent().text, 0.9);
  $('slowBtn').onclick = () => speak(getCurrent().text, 0.55);
  $('pronounceBtn').onclick = () => $('pronunciation').classList.toggle('show');
  $('translateBtn').onclick = () => $('translation').classList.toggle('show');

  $('prevBtn').onclick = () => {
    currentIdx = (currentIdx - 1 + shuffled.length) % shuffled.length;
    render();
  };

  $('nextBtn').onclick = () => {
    currentIdx = (currentIdx + 1) % shuffled.length;
    render();
  };

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); speak(getCurrent().text, 0.9); }
    if (e.code === 'ArrowRight') { currentIdx = (currentIdx + 1) % shuffled.length; render(); }
    if (e.code === 'ArrowLeft') { currentIdx = (currentIdx - 1 + shuffled.length) % shuffled.length; render(); }
    if (e.code === 'Escape') hidePopup();
  });

  // ============ INIT ============
  render();
});
</script>
